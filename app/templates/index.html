{% extends "base.html" %}

{% block content %}
<div id="video-feed" class="video-feed">
    <!-- Videos will be injected here by JS -->
</div>

<!-- Floating Upload Button -->
<button id="floating-upload-btn" class="upload-btn neon-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
</button>

<!-- Upload Modal (Hidden by default) -->
<div id="upload-modal" class="modal-overlay hidden">
    <div class="modal-content glass-panel">
        <button id="close-modal" class="close-btn">&times;</button>
        <h2>Upload a Video</h2>
        <p class="subtitle">Max size: 50MB. (mp4, webm, ogg)</p>
        <form id="upload-form" enctype="multipart/form-data">
            <div class="file-input-wrapper">
                <input type="file" name="video" id="video-input" accept="video/mp4,video/webm,video/ogg" required>
                <label for="video-input" class="file-label">Choose Video</label>
            </div>
            <div id="upload-status" class="status-msg"></div>
            <button type="submit" class="submit-btn primary-btn">Upload to Queue</button>
        </form>
    </div>
</div>
{% endblock %}
